name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      id: setup-gradle

    - name: Build a remapped jar using the Gradle
      run: gradle remapJar
    - name: Upload mod file
      uses: actions/upload-artifact@v7
      with:
        path: build/libs/Anubis-*.*.?.jar
        archive: false
